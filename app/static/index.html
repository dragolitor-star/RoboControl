<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RCS-2000 Robot Kontrol Sistemi — Middleware Dashboard">
  <title>RCS-2000 Control Center</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%237c3aed'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='800' font-size='16'>R</text></svg>">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Mobile sidebar backdrop -->
  <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="App.toggleMobileMenu()"></div>

  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">R</div>
        <h1>RCS-2000<span>Control Center</span></h1>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="connection-status">
          <span id="conn-dot" class="status-dot"></span>
          <span id="conn-text">Bağlanıyor…</span>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <button class="hamburger" onclick="App.toggleMobileMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div id="page-content"></div>
    </main>
  </div>

  <!-- Modal container -->
  <div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)App.closeModal()"></div>

  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
